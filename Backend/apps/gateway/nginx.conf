events {
  worker_connections 1024;
}

http {

  # ── Rate limiting ─────────────────────────────────────────────────
  # 10 requests/sec per IP, stored in 10MB zone
  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

  # ── Logging format ────────────────────────────────────────────────
  log_format main '$remote_addr "$request_method $request_uri" '
                  'status=$status upstream=$upstream_addr '
                  'duration=${request_time}s';

  access_log /var/log/nginx/access.log main;
  error_log  /var/log/nginx/error.log warn;

  # ── Upstreams (matches your docker-compose service names) ─────────
  upstream user_service {
    server user-service:3001;
  }

  upstream product_service {
    server product-service:3002;
  }

  upstream order_service {
    server order-service:3003;
  }

  upstream payment_service {
    server payment-service:3004;
  }

#   upstream cart_service {
#     server cart-service:3005;
#   }

#   upstream notification_service {
#     server notification-service:3006;
#   }

  # ── Server ────────────────────────────────────────────────────────
  server {
    listen 80;

    # Security headers on all responses
    add_header X-Request-ID        $request_id  always;
    add_header X-Content-Type-Options nosniff   always;
    add_header X-Frame-Options     DENY          always;

    # ── Users ──────────────────────────────────────────────────────
    location /api/users/ {
      limit_req zone=api_limit burst=20 nodelay;
      proxy_pass       http://user_service;
      proxy_set_header Host            $host;
      proxy_set_header X-Real-IP       $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Request-ID    $request_id;
    }

    # ── Products ───────────────────────────────────────────────────
    location /api/products/ {
      limit_req zone=api_limit burst=20 nodelay;
      proxy_pass       http://product_service;
      proxy_set_header Host            $host;
      proxy_set_header X-Real-IP       $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Request-ID    $request_id;
    }

    # ── Orders ─────────────────────────────────────────────────────
    location /api/order/ {
      limit_req zone=api_limit burst=20 nodelay;
      proxy_pass       http://order_service;
      proxy_set_header Host            $host;
      proxy_set_header X-Real-IP       $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Request-ID    $request_id;
    }

    # ── Payments ───────────────────────────────────────────────────
    location /api/payments/ {
      limit_req zone=api_limit burst=20 nodelay;
      proxy_pass       http://payment_service;
      proxy_set_header Host            $host;
      proxy_set_header X-Real-IP       $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Request-ID    $request_id;
    }

    # # ── Cart ───────────────────────────────────────────────────────
    # location /api/cart/ {
    #   limit_req zone=api_limit burst=20 nodelay;
    #   proxy_pass       http://cart_service;
    #   proxy_set_header Host            $host;
    #   proxy_set_header X-Real-IP       $remote_addr;
    #   proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #   proxy_set_header X-Request-ID    $request_id;
    # }

    # # ── Notifications ──────────────────────────────────────────────
    # location /api/notifications/ {
    #   limit_req zone=api_limit burst=20 nodelay;
    #   proxy_pass       http://notification_service;
    #   proxy_set_header Host            $host;
    #   proxy_set_header X-Real-IP       $remote_addr;
    #   proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #   proxy_set_header X-Request-ID    $request_id;
    # }

    # ── Gateway health check ───────────────────────────────────────
    location /health {
      access_log off;
      return 200 '{"status":"ok","gateway":"nginx"}';
      add_header Content-Type application/json;
    }

    # ── 404 catch-all ──────────────────────────────────────────────
    location / {
      return 404 '{"error":"route not found"}';
      add_header Content-Type application/json;
    }
  }
}